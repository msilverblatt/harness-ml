[project]
name = "easyml-models"
version = "0.1.0"
description = "Model training, ensembling, and calibration for EasyML"
requires-python = ">=3.11"
dependencies = [
    "easyml-schemas",
    "numpy>=1.24",
    "scikit-learn>=1.3",
    "scipy>=1.10",
]

[project.optional-dependencies]
xgboost = ["xgboost>=1.7"]
catboost = ["catboost>=1.2"]
lightgbm = ["lightgbm>=4.0"]
torch = ["torch>=2.0", "pytorch-tabnet>=4.0"]
all = ["xgboost>=1.7", "catboost>=1.2", "lightgbm>=4.0", "torch>=2.0", "pytorch-tabnet>=4.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/easyml"]

[tool.uv.sources]
easyml-schemas = { workspace = true }
