name: Publish to PyPI

on:
  push:
    tags:
      - "core-v*"
      - "plugin-v*"
      - "sports-v*"
      - "studio-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: uv pip install --system build

      - name: Determine package from tag
        id: package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == core-v* ]]; then
            echo "dir=packages/harness-core" >> "$GITHUB_OUTPUT"
            echo "name=harness-core" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == plugin-v* ]]; then
            echo "dir=packages/harness-plugin" >> "$GITHUB_OUTPUT"
            echo "name=harness-plugin" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == sports-v* ]]; then
            echo "dir=packages/harness-sports" >> "$GITHUB_OUTPUT"
            echo "name=harness-sports" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == studio-v* ]]; then
            echo "dir=packages/harness-studio" >> "$GITHUB_OUTPUT"
            echo "name=harness-studio" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown tag prefix: $TAG" >&2
            exit 1
          fi

      - name: Build package
        run: python -m build --wheel --sdist ${{ steps.package.outputs.dir }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.package.outputs.dir }}/dist/
