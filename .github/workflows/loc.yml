name: Lines of Code

on:
  push:
    branches: [main]

jobs:
  loc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cloc
        run: sudo apt-get install -y cloc

      - name: Count lines of code
        id: cloc
        run: |
          total=$(cloc packages/ --include-lang=Python,TypeScript,CSS --json | jq '.SUM.code')
          echo "total=$total" >> "$GITHUB_OUTPUT"

      - name: Update LOC gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          total="${{ steps.cloc.outputs.total }}"
          if [ "$total" -ge 1000 ]; then
            formatted="$(echo "scale=1; $total / 1000" | bc)k"
          else
            formatted="$total"
          fi
          cat > loc.json <<EOJSON
          {
            "schemaVersion": 1,
            "label": "lines of code",
            "message": "${formatted}",
            "color": "blue"
          }
          EOJSON
          gh gist edit 176db496aed8a6532131c9aa7447f59c -f loc.json loc.json

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: Count tests
        id: tests
        run: |
          count=$(uv run pytest --co -q 2>&1 | tail -1 | grep -oP '^\d+')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Update tests gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          count="${{ steps.tests.outputs.count }}"
          cat > tests.json <<EOJSON
          {
            "schemaVersion": 1,
            "label": "tests",
            "message": "${count} passing",
            "color": "brightgreen"
          }
          EOJSON
          gh gist edit 2f3d3f20d7fedaca8332a75394eb7864 -f tests.json tests.json
