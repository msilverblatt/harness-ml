[project]
name = "easyml-data"
version = "0.1.0"
description = "Data ingestion and validation for EasyML"
requires-python = ">=3.11"
dependencies = [
    "easyml-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/easyml"]

[tool.uv.sources]
easyml-schemas = { workspace = true }
