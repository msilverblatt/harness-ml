[project]
name = "easyml-sports"
version = "0.1.0"
description = "Sports domain plugin for easyml (matchup prediction, pairwise features)"
requires-python = ">=3.11"
dependencies = ["easyml-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/easyml"]

[tool.uv.sources]
easyml-core = { workspace = true }
