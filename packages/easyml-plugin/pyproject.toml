[project]
name = "easyml-plugin"
version = "0.1.0"
description = "Claude Code plugin for AI-driven ML experimentation"
requires-python = ">=3.11"
dependencies = [
    "easyml-core",
    "mcp>=1.0",
]

[tool.uv.sources]
easyml-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/easyml"]
