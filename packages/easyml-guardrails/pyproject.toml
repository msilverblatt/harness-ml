[project]
name = "easyml-guardrails"
version = "0.1.0"
description = "AI guardrails and MCP server for EasyML"
requires-python = ">=3.11"
dependencies = [
    "easyml-schemas",
    "easyml-experiments",
    "fastmcp>=0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/easyml"]

[tool.uv.sources]
easyml-schemas = { workspace = true }
easyml-experiments = { workspace = true }
