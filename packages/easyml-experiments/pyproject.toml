[project]
name = "easyml-experiments"
version = "0.1.0"
description = "Experiment tracking and overlay management for EasyML"
requires-python = ">=3.11"
dependencies = [
    "easyml-schemas",
    "easyml-config",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/easyml"]

[tool.uv.sources]
easyml-schemas = { workspace = true }
easyml-config = { workspace = true }
