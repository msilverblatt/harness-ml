models:
  logreg_seed:
    type: logistic_regression
    features:
    - diff_seed_num
    train_seasons: all
    params:
      C: 1.0

  xgb_core:
    type: xgboost
    features:
    - diff_seed_num
    - diff_bt_barthag
    - diff_win_pct
    - diff_sr_srs
    - diff_net_efficiency
    train_seasons: all
    params:
      max_depth: 4
      learning_rate: 0.01
      n_estimators: 1000
      early_stopping_rounds: 20
      subsample: 0.8
      colsample_bytree: 0.8
      min_child_weight: 3
      gamma: 0.1
      reg_alpha: 0.1
      reg_lambda: 1.0
      objective: "binary:logistic"
      eval_metric: logloss

  xgb_spread_broad:
    type: xgboost_regression
    features:
    - diff_seed_num
    - diff_scoring_margin
    - diff_ppg
    - diff_opp_ppg
    - diff_scoring_margin_std
    - diff_bt_adj_tempo
    - diff_tempo
    - diff_ft_rate
    - diff_tov_pct
    - diff_orpg
    - diff_bt_efg_o
    - diff_bt_efg_d
    - diff_fg3_pct
    - diff_fg_pct
    - diff_or_pct
    train_seasons: all
    params:
      max_depth: 1
      learning_rate: 0.01
      n_estimators: 1000
      early_stopping_rounds: 20
      subsample: 0.7
      colsample_bytree: 0.6
      min_child_weight: 5
      gamma: 0.1
      reg_alpha: 0.1
      reg_lambda: 3.0
      objective: "reg:squarederror"
      eval_metric: rmse

  v2_mlp_margin:
    type: mlp
    prediction_type: margin
    features:
    - diff_adj_de
    - diff_adj_net
    - diff_adj_oe
    - diff_adj_tempo
    - diff_apg
    - diff_bpg
    - diff_close_game_count
    - diff_drpg
    - diff_eff_last10
    - diff_eff_std
    - diff_eff_trend
    - diff_four_factors_defense
    - diff_four_factors_offense
    - diff_luck_index
    - diff_off_efficiency
    - diff_opp_ft_rate
    - diff_opp_tov_pct
    - diff_pfpg
    - diff_prestige_e8_last5
    - diff_prestige_f4_last5
    - diff_prestige_tourney_last5
    - diff_prestige_wins_last5
    - diff_road_neutral_eff
    - diff_rpg
    - diff_spg
    - diff_sr_drtg
    - diff_sr_efg_pct
    - diff_sr_opp_efg_pct
    - diff_sr_opp_ftr
    - diff_sr_opp_orb_pct
    - diff_sr_opp_tov_pct
    - diff_sr_tov_pct
    - diff_sr_trb_pct
    - diff_topg
    - diff_vs_top100_net_eff
    train_seasons: all
    params:
      hidden_layers: [128, 64]
      dropout: 0.4
      learning_rate: 0.001
      epochs: 150
      batch_size: 64
      early_stopping_rounds: 20
      weight_decay: 0.001
      seed: 42
      n_seeds: 5

  v2_tabnet_clf:
    type: tabnet
    features:
    - diff_seed_num
    - diff_win_pct
    - diff_ppg
    - diff_opp_ppg
    - diff_scoring_margin
    train_seasons: all
    params:
      n_d: 16
      n_a: 16
      n_steps: 3
      relaxation_factor: 1.5
      lambda_sparse: 0.001
      learning_rate: 0.02
      max_epochs: 100
      patience: 15
      batch_size: 256
      seed: 42
      n_seeds: 5

  cat_roster:
    type: catboost
    features:
    - diff_bt_roster_experience
    - diff_bt_roster_height_avg
    - diff_bt_bpm_dropoff
    - diff_bt_top5_avg_bpm
    - diff_bt_top_player_bpm
    - diff_bt_efg_pct
    - diff_bt_efg_pct_def
    train_seasons: all
    params:
      iterations: 1000
      depth: 4
      learning_rate: 0.03
      l2_leaf_reg: 15
      random_strength: 2.0
      early_stopping_rounds: 20
      subsample: 0.8
      verbose: 0

  v2_elasticnet_clf:
    type: elastic_net
    features:
    - diff_adj_de
    - diff_adj_net
    - diff_adj_oe
    train_seasons: all
    params:
      C: 0.01
      l1_ratio: 1.0

  xgb_travel:
    type: xgboost_regression
    features:
    - diff_travel_distance_mi
    - diff_travel_time_zones
    - diff_travel_cbrt_distance
    train_seasons: all
    params:
      max_depth: 1
      learning_rate: 0.01
      n_estimators: 500
      early_stopping_rounds: 20
      subsample: 0.8
      colsample_bytree: 0.8
      min_child_weight: 5
      gamma: 0.2
      reg_alpha: 0.5
      reg_lambda: 3.0
      objective: "reg:squarederror"

  gnn_hetero:
    type: gnn
    feature_sets: []
    train_seasons: all
    params:
      embedding_dim: 64
      num_gnn_layers: 3

  survival_hazard:
    type: survival
    features:
    - seed_num
    - win_pct_last5
    - scoring_margin
    train_seasons: all
    params:
      max_depth: 3
      learning_rate: 0.03
