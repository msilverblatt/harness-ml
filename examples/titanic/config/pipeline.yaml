data:
  raw_dir: data/raw
  processed_dir: data/processed
  features_dir: data/features
  features_file: features.parquet
  outputs_dir: outputs
  task: binary
  target_column: Survived
  views: {}
  features_view: null
  exclude_columns:
  - PassengerId
  - Name
  - Ticket
  - Cabin
  - Sex
  - Embarked
  feature_defs:
    family_size:
      name: family_size
      type: pairwise
      source: null
      column: null
      formula: SibSp + Parch + 1
      condition: null
      pairwise_mode: diff
      description: Total family size aboard (self + siblings/spouses + parents/children)
      nan_strategy: median
      category: general
      enabled: true
    fare_per_person:
      name: fare_per_person
      type: pairwise
      source: null
      column: null
      formula: Fare / (SibSp + Parch + 1)
      condition: null
      pairwise_mode: diff
      description: "Fare divided by family size \u2014 proxy for individual wealth\
        \ since tickets were often shared"
      nan_strategy: median
      category: general
      enabled: true
    age_class_interact:
      name: age_class_interact
      type: pairwise
      source: null
      column: null
      formula: Age * Pclass
      condition: null
      pairwise_mode: diff
      description: "Age times class \u2014 older 3rd class passengers faced the worst\
        \ survival odds"
      nan_strategy: median
      category: general
      enabled: true
backtest:
  cv_strategy: leave_one_out
  fold_values:
  - 0
  - 1
  - 2
  - 3
  - 4
  metrics:
  - brier
  - accuracy
  - log_loss
  - auc
  min_train_folds: 1
  fold_column: fold
