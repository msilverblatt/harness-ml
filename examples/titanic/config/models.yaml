models:
  xgb_base:
    type: xgboost
    params:
      n_estimators: 100
      max_depth: 3
      learning_rate: 0.1
    features:
    - Pclass
    - Age
    - Fare
    - is_female
    - SibSp
    - Parch
    - family_size
    - fare_per_person
    active: true
    include_in_ensemble: true
  rf_base:
    type: random_forest
    params:
      n_estimators: 200
      max_depth: 8
      min_samples_leaf: 5
    features:
    - Pclass
    - Age
    - Fare
    - is_female
    - family_size
    - fare_per_person
    - age_class_interact
    - has_cabin
    - is_child
    - is_master
    active: true
    include_in_ensemble: true
