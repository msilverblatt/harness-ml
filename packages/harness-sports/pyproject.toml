[project]
name = "harness-sports"
version = "0.1.0"
description = "Sports domain plugin for harnessml (matchup prediction, pairwise features)"
requires-python = ">=3.11"
dependencies = ["harness-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harnessml"]

[tool.uv.sources]
harness-core = { workspace = true }
