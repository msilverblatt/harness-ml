[project]
name = "easyml-config"
version = "0.1.0"
description = "Configuration resolution and validation for EasyML"
requires-python = ">=3.11"
dependencies = [
    "easyml-schemas",
    "omegaconf>=2.3",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/easyml"]

[tool.uv.sources]
easyml-schemas = { workspace = true }
